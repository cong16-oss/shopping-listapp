<!DOCTYPE html>
<!-- Created: 2026-05-11 -->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #4f8ef7, #6c63ff);
      color: #fff;
      padding: 28px 24px 20px;
    }

    .header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
    .header .subtitle { font-size: .85rem; opacity: .8; }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 20px 24px;
      border-bottom: 1px solid #eef0f3;
    }

    .input-area input {
      flex: 1;
      border: 2px solid #e2e6ea;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }

    .input-area input:focus { border-color: #4f8ef7; }
    .input-area input:disabled { background: #f7f9fc; }

    .input-area button {
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }

    .input-area button:hover:not(:disabled) { background: #3a7be8; }
    .input-area button:active:not(:disabled) { transform: scale(.96); }
    .input-area button:disabled { opacity: .5; cursor: not-allowed; }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 24px;
      font-size: .82rem;
      color: #8a94a6;
      border-bottom: 1px solid #eef0f3;
    }

    .toolbar button {
      background: none;
      border: none;
      color: #e05260;
      font-size: .82rem;
      cursor: pointer;
      padding: 2px 0;
    }

    .toolbar button:hover { text-decoration: underline; }

    .list {
      list-style: none;
      padding: 8px 0;
      min-height: 60px;
    }

    .list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      transition: background .15s, opacity .2s;
    }

    .list li:hover { background: #f7f9fc; }
    .list li.busy { opacity: .5; pointer-events: none; }

    .list li.done .item-text {
      text-decoration: line-through;
      color: #b0b8c4;
    }

    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #c5cdd8;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color .2s, background .2s;
    }

    .check-btn.checked {
      border-color: #4f8ef7;
      background: #4f8ef7;
    }

    .check-btn .checkmark {
      display: none;
      color: #fff;
      font-size: 13px;
      line-height: 1;
    }

    .check-btn.checked .checkmark { display: block; }

    .item-text {
      flex: 1;
      font-size: .95rem;
      color: #2d3748;
      word-break: break-word;
    }

    .del-btn {
      background: none;
      border: none;
      color: #c5cdd8;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 6px;
      transition: color .2s, background .2s;
      flex-shrink: 0;
    }

    .del-btn:hover { color: #e05260; background: #fdecea; }

    .empty {
      text-align: center;
      padding: 32px 24px;
      color: #b0b8c4;
      font-size: .9rem;
    }

    .empty .icon { font-size: 2.5rem; margin-bottom: 8px; }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 24px;
      font-size: .75rem;
      min-height: 28px;
      border-top: 1px solid #eef0f3;
    }

    .status-bar.loading { color: #8a94a6; }
    .status-bar.error   { color: #e05260; }
    .status-bar.ok      { color: #38a169; }

    .spinner {
      width: 12px; height: 12px;
      border: 2px solid #e2e6ea;
      border-top-color: #4f8ef7;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🛒 쇼핑 리스트</h1>
    <div class="subtitle" id="subtitle">불러오는 중...</div>
  </div>

  <div class="input-area">
    <input id="itemInput" type="text" placeholder="아이템 추가..." maxlength="80" disabled />
    <button id="addBtn" disabled>추가</button>
  </div>

  <div class="toolbar">
    <span id="countText"></span>
    <button id="clearDoneBtn" style="display:none">완료 항목 삭제</button>
  </div>

  <ul class="list" id="list"></ul>

  <div class="status-bar loading" id="statusBar">
    <div class="spinner"></div>
    <span id="statusMsg">Supabase에 연결 중...</span>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://geyourpgixcqxxpzkdpz.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdleW91cnBnaXhjcXh4cHprZHB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0ODUzMjEsImV4cCI6MjA5NDA2MTMyMX0.vfVPOGM5nAD94W27FG0ZQdmvuT2vBcDBK_RQZSTqNJk';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  const input     = document.getElementById('itemInput');
  const addBtn    = document.getElementById('addBtn');
  const listEl    = document.getElementById('list');
  const subtitle  = document.getElementById('subtitle');
  const countText = document.getElementById('countText');
  const clearBtn  = document.getElementById('clearDoneBtn');
  const statusBar = document.getElementById('statusBar');
  const statusMsg = document.getElementById('statusMsg');

  let items = [];

  function setStatus(type, msg) {
    statusBar.className = 'status-bar ' + type;
    statusBar.querySelector('.spinner').style.display = type === 'loading' ? 'block' : 'none';
    statusMsg.textContent = msg;
  }

  function setReady(on) {
    input.disabled = !on;
    addBtn.disabled = !on;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function render() {
    listEl.innerHTML = '';
    if (items.length === 0) {
      listEl.innerHTML = '<div class="empty"><div class="icon">🧺</div>아이템을 추가해 보세요</div>';
    } else {
      items.forEach(item => {
        const li = document.createElement('li');
        if (item.done) li.classList.add('done');
        li.dataset.id = item.id;
        li.innerHTML = `
          <button class="check-btn ${item.done ? 'checked' : ''}" data-id="${item.id}" title="완료 토글">
            <span class="checkmark">✓</span>
          </button>
          <span class="item-text">${escHtml(item.text)}</span>
          <button class="del-btn" data-id="${item.id}" title="삭제">✕</button>
        `;
        listEl.appendChild(li);
      });
    }

    const total = items.length;
    const done  = items.filter(x => x.done).length;
    subtitle.textContent = total === 0 ? '항목이 없습니다' : `${done} / ${total} 완료`;
    countText.textContent = total > 0 ? `총 ${total}개` : '';
    clearBtn.style.display = done > 0 ? 'block' : 'none';
  }

  async function loadItems() {
    setStatus('loading', 'Supabase에 연결 중...');
    const { data, error } = await db
      .from('shopping_items')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) { setStatus('error', '연결 실패: ' + error.message); return; }
    items = data;
    render();
    setReady(true);
    setStatus('ok', 'Supabase 연결됨');
  }

  async function addItem() {
    const text = input.value.trim();
    if (!text) { input.focus(); return; }

    setReady(false);
    const { data, error } = await db
      .from('shopping_items')
      .insert({ text, done: false })
      .select()
      .single();

    if (error) { setStatus('error', '추가 실패: ' + error.message); setReady(true); return; }

    items.unshift(data);
    input.value = '';
    render();
    setReady(true);
    setStatus('ok', '항목이 추가됨');
    input.focus();
  }

  async function toggleItem(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    const li = listEl.querySelector(`li[data-id="${id}"]`);
    if (li) li.classList.add('busy');

    const { error } = await db
      .from('shopping_items')
      .update({ done: !item.done })
      .eq('id', id);

    if (error) { setStatus('error', '업데이트 실패: ' + error.message); if (li) li.classList.remove('busy'); return; }
    item.done = !item.done;
    render();
    setStatus('ok', item.done ? '완료로 표시됨' : '미완료로 변경됨');
  }

  async function deleteItem(id) {
    const li = listEl.querySelector(`li[data-id="${id}"]`);
    if (li) li.classList.add('busy');

    const { error } = await db
      .from('shopping_items')
      .delete()
      .eq('id', id);

    if (error) { setStatus('error', '삭제 실패: ' + error.message); if (li) li.classList.remove('busy'); return; }
    items = items.filter(i => i.id !== id);
    render();
    setStatus('ok', '항목이 삭제됨');
  }

  async function clearDone() {
    clearBtn.disabled = true;
    const { error } = await db
      .from('shopping_items')
      .delete()
      .eq('done', true);

    if (error) { setStatus('error', '삭제 실패: ' + error.message); clearBtn.disabled = false; return; }
    items = items.filter(i => !i.done);
    render();
    setStatus('ok', '완료 항목이 모두 삭제됨');
    clearBtn.disabled = false;
  }

  addBtn.addEventListener('click', addItem);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
  clearBtn.addEventListener('click', clearDone);

  listEl.addEventListener('click', e => {
    const checkBtn = e.target.closest('.check-btn');
    const delBtn   = e.target.closest('.del-btn');
    if (checkBtn) toggleItem(checkBtn.dataset.id);
    if (delBtn)   deleteItem(delBtn.dataset.id);
  });

  loadItems();
</script>
</body>
</html>
